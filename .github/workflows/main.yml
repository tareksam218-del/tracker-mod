name: Build Tracker Mod

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.8-bin.zip
          unzip -q gradle-8.8-bin.zip
          export PATH=$PATH:$(pwd)/gradle-8.8/bin
          echo "$(pwd)/gradle-8.8/bin" >> $GITHUB_PATH

      - name: Build mod
        run: |
          cd tracker-mod_5/tracker-mod
          gradle build

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: tracker-mod-jar
          path: tracker-mod_5/tracker-mod/build/libs/tracker-mod-1.0.0.jar
          retention-days: 30
